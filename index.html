/* ================= PENYIMPANAN ================= */
let state;
let simpanGagalDiberitahu = false;

/* Baku-kan struktur data (dari localStorage maupun impor) supaya data
   rusak/tidak lengkap tidak membuat aplikasi macet atau salah hitung. */
function amanId(v){ return String(v==null?"":v).replace(/[^a-zA-Z0-9_-]/g,"").slice(0,60); }
function normalisasiData(d){
  const teks = v => String(v==null ? "" : v);
  const dipakai = new Set();
  const daftar = (d && Array.isArray(d.produk)) ? d.produk : [];
  const produk = daftar.map((p,idx)=>{
    if(!p || typeof p !== "object") p = {};
    let id = amanId(p.id) || ("produk-" + (idx+1));
    while(dipakai.has(id)) id += "x";
    dipakai.add(id);
    const bahan = (Array.isArray(p.bahan) ? p.bahan : []).map(b=>({
      nama: teks(b && b.nama), jumlah: angkaPositif(b && b.jumlah),
      satuan: (b && (b.satuan==="ml" || b.satuan==="pcs")) ? b.satuan : "g",
      hargaBeli: angkaPositif(b && b.hargaBeli), isiBeli: angkaPositif(b && b.isiBeli)
    }));
    const kemasan = (Array.isArray(p.kemasan) ? p.kemasan : []).map(k=>({
      nama: teks(k && k.nama), harga: angkaPositif(k && k.harga)
    }));
    return {
      id, nama: teks(p.nama) || "Produk", kategori: teks(p.kategori), deskripsi: teks(p.deskripsi),
      hasilBatch: angkaPositif(p.hasilBatch), namaUnit: teks(p.namaUnit) || "unit",
      isiPerUnit: angkaPositif(p.isiPerUnit), satuanIsi: p.satuanIsi==="ml" ? "ml" : "g",
      susutPersen: angkaPositif(p.susutPersen), bahan, kemasan,
      tkBatch: angkaPositif(p.tkBatch), overheadBatch: angkaPositif(p.overheadBatch),
      lainBatch: angkaPositif(p.lainBatch),
      markupReseller: angkaPositif(p.markupReseller), markupRetail: angkaPositif(p.markupRetail)
    };
  });
  const sop = (d && Array.isArray(d.sop) && d.sop.length)
    ? d.sop.map(s=>({judul: teks(s && s.judul) || "Bagian SOP", isi: teks(s && s.isi)}))
    : sopBawaan();
  return { versi:1, produk, sop };
}
function muatData(){
  try{
    const mentah = localStorage.getItem(KUNCI_SIMPAN);
    if(mentah){
      const d = JSON.parse(mentah);
      if(d && Array.isArray(d.produk)) return normalisasiData(d);
    }
  }catch(e){ console.warn("Gagal memuat data tersimpan:", e); }
  return dataBawaan();
}
function simpan(){
  try{ localStorage.setItem(KUNCI_SIMPAN, JSON.stringify(state)); }
  catch(e){
    console.warn("Gagal menyimpan:", e);
    if(!simpanGagalDiberitahu){
      simpanGagalDiberitahu = true;
      alert("⚠️ Data GAGAL tersimpan otomatis (penyimpanan browser penuh atau terblokir).\nPerubahan bisa hilang saat halaman ditutup — segera lakukan Ekspor Data.");
    }
  }
}

  if(confirm("Kembalikan SEMUA data ke resep contoh bawaan? Perubahan Anda akan hilang.\n\nSaran: lakukan Ekspor Data dulu sebagai cadangan.")){
    state = dataBawaan(); simpan(); render();
  }
}
function eksporData(){
  const isi = JSON.stringify(state, null, 2);
  const blob = new Blob([isi], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  const t = new Date();
  a.download = "knj-kalkulator-" + t.getFullYear() + String(t.getMonth()+1).padStart(2,"0") + String(t.getDate()).padStart(2,"0") + ".json";
  a.click();
  URL.revokeObjectURL(a.href);
}
function imporData(inp){
  const f = inp.files && inp.files[0];
  if(!f) return;
  const r = new FileReader();
  r.onload = function(){
    try{
      const d = JSON.parse(r.result);
      if(!d || !Array.isArray(d.produk)) throw new Error("Format tidak dikenal");
      state = normalisasiData(d); simpan(); render();
      alert("Data berhasil diimpor: " + state.produk.length + " produk.");
    }catch(e){ alert("File tidak valid: " + e.message); }
  };
  r.readAsText(f);
  inp.value = "";
}

/* ================= UTILITAS ================= */
const fmtRp = n => "Rp " + (isFinite(n) ? Math.round(n).toLocaleString("id-ID") : "—");
const fmtAngka = n => isFinite(n) ? (Math.round(n*100)/100).toLocaleString("id-ID") : "—";
const bulatkanKeAtas = (n, kelipatan) => {
  if(!isFinite(n)) return NaN;   // data belum lengkap → tampil "—", bukan Rp 0
  if(n<=0) return 0;
  const k = kelipatan || 500;
  return Math.ceil(n/k)*k;
};
function esk(s){
  return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
const angka = v => { const n = parseFloat(v); return isFinite(n) ? n : 0; };
const angkaPositif = v => Math.max(0, angka(v));

/* ================= PERHITUNGAN INTI =================
   hargaSatuan  = hargaBeli / isiBeli           (Rp per g / ml / pcs)
   biayaBahan   = Σ (jumlah × hargaSatuan) × (1 + susut%)
   kemasanBatch = Σ harga kemasan per unit × hasilBatch
   HPP batch    = biayaBahan + kemasanBatch + TK + overhead + lain-lain
   HPP unit     = HPP batch ÷ hasilBatch
   Harga jual   = HPP unit × (1 + markup%) → dibulatkan ke atas kelipatan Rp500
*/
function hargaSatuanBahan(b){
  const isi = angka(b.isiBeli);
  // isi beli belum diisi → NaN, supaya HPP tampil "—" dan tidak diam-diam terlalu murah
  return isi > 0 ? angka(b.hargaBeli)/isi : NaN;
}
function hitungProduk(p){
  const biayaBahanMurni = p.bahan.reduce((t,b)=> t + angka(b.jumlah)*hargaSatuanBahan(b), 0);
  const faktorSusut = 1 + angka(p.susutPersen)/100;
  const biayaBahan = biayaBahanMurni * faktorSusut;
  const kemasanPerUnit = p.kemasan.reduce((t,k)=> t + angka(k.harga), 0);
  const hasil = Math.max(angka(p.hasilBatch), 0);
  const kemasanBatch = kemasanPerUnit * hasil;
  const tk = angka(p.tkBatch), ov = angka(p.overheadBatch), lain = angka(p.lainBatch);
  const hppBatch = biayaBahan + kemasanBatch + tk + ov + lain;
  const hppUnit = hasil > 0 ? hppBatch/hasil : NaN;

  const hargaReseller = bulatkanKeAtas(hppUnit*(1+angka(p.markupReseller)/100));
  const hargaRetail   = bulatkanKeAtas(hppUnit*(1+angka(p.markupRetail)/100));

  const totalGramasi = p.bahan.reduce((t,b)=> (b.satuan==="g"||b.satuan==="ml") ? t+angka(b.jumlah) : t, 0);
  const gramasiPerUnit = hasil > 0 ? totalGramasi/hasil : NaN;

  return {
    biayaBahanMurni, biayaBahan, kemasanPerUnit, kemasanBatch, tk, ov, lain,
    hppBatch, hppUnit, hargaReseller, hargaRetail,
    labaReseller: hargaReseller - hppUnit,
    labaRetail: hargaRetail - hppUnit,
    totalGramasi, gramasiPerUnit, hasil
  };
}

/* ----- mutasi data produk (dipanggil dari input) ----- */
const FIELD_ANGKA_PRODUK = ["hasilBatch","isiPerUnit","susutPersen","tkBatch","overheadBatch","lainBatch","markupReseller","markupRetail"];
function ubahProduk(id, field, nilai){
  const p = cariProduk(id); if(!p) return;
  p[field] = FIELD_ANGKA_PRODUK.includes(field) ? angkaPositif(nilai) : nilai;
  simpan(); perbaruiHitungan(id);
}
function ubahBahan(id, i, field, nilai){
  const p = cariProduk(id); if(!p || !p.bahan[i]) return;
  p.bahan[i][field] = (field==="nama"||field==="satuan") ? nilai : angkaPositif(nilai);
  simpan(); perbaruiHitungan(id);
}
function ubahKemasan(id, i, field, nilai){
  const p = cariProduk(id); if(!p || !p.kemasan[i]) return;
  p.kemasan[i][field] = field==="nama" ? nilai : angkaPositif(nilai);
  simpan(); perbaruiHitungan(id);
}
function tambahBahan(id){
  const p = cariProduk(id); if(!p) return;
  p.bahan.push({nama:"Bahan baru", jumlah:0, satuan:"g", hargaBeli:0, isiBeli:1000});
  simpan(); render();
}
function hapusBahan(id,i){
  const p = cariProduk(id); if(!p || !p.bahan[i]) return;
  if(!confirm('Hapus bahan "' + (p.bahan[i].nama || "tanpa nama") + '"?')) return;
  p.bahan.splice(i,1); simpan(); render();
}
function tambahKemasan(id){
  const p = cariProduk(id); if(!p) return;
  p.kemasan.push({nama:"Komponen baru", harga:0});
  simpan(); render();
}
function hapusKemasan(id,i){
  const p = cariProduk(id); if(!p || !p.kemasan[i]) return;
  if(!confirm('Hapus komponen kemasan "' + (p.kemasan[i].nama || "tanpa nama") + '"?')) return;
  p.kemasan.splice(i,1); simpan(); render();
}
/* Render ulang penuh saat mengetik akan mematikan fokus keyboard,
   jadi angka-angka hasil hitung diperbarui langsung di tempatnya. */
function aturKolom(nama, html){
  const el = document.querySelector('[data-kolom="' + nama + '"]');
  if(el) el.innerHTML = html;
}
function perbaruiHitungan(id){
  if(tabAktif !== "produk" || produkAktif !== id) return;
  const p = cariProduk(id); if(!p) return;
  const h = hitungProduk(p);
  p.bahan.forEach((b,i)=>{
    const hs = hargaSatuanBahan(b);
    aturKolom("hargasatuan-" + i, fmtRp(hs) + "/" + esk(b.satuan));
    aturKolom("subtotal-" + i, "<b>" + fmtRp(angka(b.jumlah)*hs) + "</b>");
  });
  aturKolom("info-total-bahan", infoTotalBahan(h));
  aturKolom("total-bahan", "<b>" + fmtRp(h.biayaBahanMurni) + "</b>");
  aturKolom("total-kemasan", "<b>" + fmtRp(h.kemasanPerUnit) + "</b>");
  aturKolom("cek-gramasi", catatanCekGramasi(p,h));
  aturKolom("judul-produk", esk(p.nama));
  const kotak = document.getElementById("kotakHasil");
  if(kotak) kotak.innerHTML = isiKotakHasil(p,h);
}

/* ---------- TAB KALKULATOR PRODUKSI ---------- */
function pilihKalkulator(id){
  if(id !== kalkulatorPilih) kalkulatorTarget = null;  // produk beda → target lama tidak relevan
  kalkulatorPilih = id; render();
}
function bukaKalkulatorProduk(id){ if(id !== kalkulatorPilih) kalkulatorTarget = null; kalkulatorPilih = id; gantiTab('kalkulator'); }
function aturTargetKalkulator(v){ kalkulatorTarget = angkaPositif(v); render(); }

function renderKalkulator(){
  if(!cariProduk(kalkulatorPilih)) kalkulatorPilih = state.produk.length ? state.produk[0].id : null;
  const p = cariProduk(kalkulatorPilih);
  let opsi = state.produk.map(x=>`<option value="${esk(x.id)}" ${x.id===kalkulatorPilih?"selected":""}>${esk(x.nama)}</option>`).join("");

  let isi = "";
  if(!p){
    isi = `<div class="kartu">Belum ada produk. Tambahkan dulu di tab Produk.</div>`;
  } else {
    const h = hitungProduk(p);
    if(h.hasil <= 0){
      isi = `<div class="catatan" style="font-size:.9rem">⚠️ Produk <b>${esk(p.nama)}</b> belum punya nilai
      <b>Hasil per batch</b>, jadi resepnya belum bisa diskalakan.
      Isi dulu kolom "Hasil per batch" di tab <b>Produk</b>.</div>`;
    } else {
      const target = (kalkulatorTarget && kalkulatorTarget>0) ? kalkulatorTarget : h.hasil;
      const faktor = target/h.hasil;

      let barisSkala = "";
      p.bahan.forEach(b=>{
        const jml = angka(b.jumlah)*faktor;
        const hs = hargaSatuanBahan(b);
        barisSkala += `<tr>
          <td style="text-align:center"><span class="kotak-cek"></span></td>
          <td>${esk(b.nama)}</td>
          <td class="angka"><b>${fmtAngka(jml)}</b> ${esk(b.satuan)}</td>
          <td class="angka">${fmtAngka(angka(b.jumlah))} ${esk(b.satuan)}</td>
          <td class="angka">${fmtRp(jml*hs)}</td>
        </tr>`;
      });
      const biayaBahanSkala = h.biayaBahan*faktor;
      const kemasanSkala = h.kemasanPerUnit*target;
      const biayaTetapSkala = (h.tk+h.ov+h.lain)*faktor;
      const totalSkala = biayaBahanSkala + kemasanSkala + biayaTetapSkala;

      isi = `
    <div class="kartu">
      <div class="form-grid">
        <div><label>Target produksi (jumlah ${esk(p.namaUnit)})</label>
          <input type="number" inputmode="decimal" min="0" step="any" value="${target}" onchange="aturTargetKalkulator(this.value)"></div>
        <div><label>Setara batch</label><div class="nilai-baca">${fmtAngka(faktor)} batch</div></div>
        <div><label>Total adonan (resep)</label><div class="nilai-baca">${fmtAngka(h.totalGramasi*faktor)} g/ml</div></div>
      </div>
      <p class="catatan" style="margin-bottom:0">Resep dasar: 1 batch = ${fmtAngka(h.hasil)} ${esk(p.namaUnit)}.
      Semua gramasi di bawah otomatis dikalikan faktor <b>×${fmtAngka(faktor)}</b>; tenaga kerja &amp; overhead
      ikut diskalakan proporsional. Biaya bahan sudah termasuk cadangan susut ${fmtAngka(p.susutPersen)}% —
      gramasi timbang tetap sesuai resep.</p>
    </div>

    <div class="kartu">
      <h3 style="margin-top:0">Kartu Batch <span style="font-weight:400;font-size:.75rem;color:var(--abu)">(diisi tangan setelah dicetak — SOP-01 &amp; SOP-07)</span></h3>
      <div class="info-batch">
        <div>No. batch: <span class="isian">&nbsp;</span></div>
        <div>Tanggal: <span class="isian">&nbsp;</span></div>
        <div>Penimbang: <span class="isian">&nbsp;</span></div>
        <div>QC: <span class="isian">&nbsp;</span></div>
      </div>
    </div>

    <div class="kartu tabel-gulir">
      <h3 style="margin-top:0">Daftar Timbang Bahan — ${esk(p.nama)} (${fmtAngka(target)} ${esk(p.namaUnit)})</h3>
      <table>
        <thead><tr><th style="width:42px">✔</th><th>Bahan</th><th class="angka">Timbang Sekarang</th><th class="angka">Resep 1 Batch</th><th class="angka">Biaya</th></tr></thead>
        <tbody>${barisSkala}</tbody>
      </table>
    </div>

    <div class="hasil-kotak">
      <div class="baris-angka"><span>Biaya bahan (+ susut)</span><b>${fmtRp(biayaBahanSkala)}</b></div>
      <div class="baris-angka"><span>Kemasan × ${fmtAngka(target)} unit</span><b>${fmtRp(kemasanSkala)}</b></div>
      <div class="baris-angka"><span>Tenaga kerja + overhead + lain-lain</span><b>${fmtRp(biayaTetapSkala)}</b></div>
      <div class="baris-angka"><span><b>Total biaya produksi</b></span><b class="hasil-utama">${fmtRp(totalSkala)}</b></div>
      <div class="baris-angka"><span><b>HPP per unit</b></span><b>${fmtRp(totalSkala/target)}</b></div>
      <div class="lencana-harga">
        <div><div class="lbl">Harga Reseller</div><div class="nilai">${fmtRp(h.hargaReseller)}</div><div class="sub">omzet ${fmtRp(h.hargaReseller*target)}</div></div>
        <div><div class="lbl">Harga Retail</div><div class="nilai">${fmtRp(h.hargaRetail)}</div><div class="sub">omzet ${fmtRp(h.hargaRetail*target)}</div></div>
        <div><div class="lbl">Potensi Laba (retail)</div><div class="nilai">${fmtRp(h.hargaRetail*target - totalSkala)}</div><div class="sub">omzet − total biaya</div></div>
      </div>
    </div>
    <button class="btn btn-sekunder" onclick="window.print()">🖨 Cetak Daftar Timbang</button>`;
    }
  }

  return `
    <h2>⚖️ Kalkulator Produksi (Skala Gramasi)</h2>
    <div class="kartu">
      <label>Pilih produk</label>
      <select onchange="pilihKalkulator(this.value)">${opsi}</select>
    </div>
    ${isi}`;
}

/* ---------- TAB SOP ---------- */
let sopSedangEdit = null;

/* Teks SOP bawaan — hanya contoh awal. Pengguna dapat mengedit/mengganti
   seluruhnya lewat tombol "Edit Bagian Ini" di tab SOP. */
function sopBawaan(){
  return [
    {judul:"SOP-01 • Perhitungan Gramasi & Penimbangan Bahan", isi:`TUJUAN
Memastikan setiap batch diproduksi dengan takaran yang sama persis, sehingga kualitas produk konsisten.

ALAT
- Timbangan digital (ketelitian min. 1 g; untuk bahan < 50 g gunakan ketelitian 0,1 g)
- Gelas ukur untuk cairan
- Wadah timbang bersih & kering
- Aplikasi ini (tab Kalkulator)

LANGKAH
1. Tentukan target produksi (jumlah unit) di tab Kalkulator.
2. Cetak / tampilkan Daftar Timbang Bahan.
3. Nolkan timbangan: letakkan wadah kosong, tekan tare hingga tampil 0. Cek akurasi timbangan secara berkala dengan anak timbangan standar.
4. Timbang bahan satu per satu sesuai daftar; beri tanda centang setiap bahan selesai.
5. Toleransi penimbangan maksimal ±2% per bahan. Lebih dari itu, ulangi.
6. Catat nomor batch, tanggal, dan nama penimbang di kartu batch.
7. Bahan yang sudah ditimbang diletakkan terpisah dari stok agar tidak tercampur.`},

    {judul:"SOP-02 • Produksi Jamu Serbuk (RootCore, StemDrive Apex Prime Balung Wesi)", isi:`1. Pastikan semua bahan bubuk kering sempurna — bahan lembap membuat produk cepat rusak.
2. Ayak setiap bahan dengan ayakan mesh 60-80 agar tekstur seragam.
3. Campur bahan bertahap (pengenceran bertingkat): bahan paling sedikit dicampur dulu dengan sebagian bahan terbanyak, lalu gabungkan semua.
4. Aduk 10-15 menit sampai warna campuran rata, tanpa gumpalan.
5. Timbang isi per unit sesuai isi bersih (mis. 100 g/botol), toleransi ±2 g.
6. Segel rapat, beri label: nama produk, nomor batch, tanggal produksi, tanggal kedaluwarsa.
7. Simpan di tempat kering, sejuk, tidak kena matahari langsung.

TITIK KRITIS (QC)
- Kekeringan bahan & kehalusan ayakan
- Kerataan campuran
- Ketepatan gramasi isi per unit`},

    {judul:"SOP-03 • Minyak Balur & Cairan Gosok (Kamlang Ndalem, Arak Gosok Sultan's Pusaka)", isi:`A. MINYAK BALUR — INFUS PANAS (Kamlang Ndalem)
1. Gunakan rempah kering (atau keringkan/sangrai rempah segar dulu) — sisa air membuat minyak cepat tengik dan berjamur.
2. Panaskan minyak dasar dengan api kecil (±60-70 °C, jangan sampai berasap).
3. Masukkan rempah iris/tumbuk, aduk perlahan 30-60 menit.
4. Matikan api, diamkan sampai hangat, saring dengan kain saring bersih 2 lapis.
5. Tambahkan minyak atsiri (gandapura, dll.) setelah dingin agar aroma tidak menguap.
6. Botolkan sesuai isi bersih (toleransi ±2 ml), segel, label — wajib cantumkan "HANYA UNTUK PEMAKAIAN LUAR".

B. ARAK GOSOK — MASERASI DINGIN (Sultan's Pusaka)
1. Masukkan rempah kering ke wadah kaca, tuang arak/etanol sampai semua terendam.
2. Tutup rapat, simpan di tempat gelap 7-14 hari, kocok 1x setiap hari.
3. Saring, botolkan, segel, label "Hanya untuk pemakaian luar".

TITIK KRITIS (QC)
- Kekeringan rempah
- Suhu minyak (gosong = rusak)
- Kebersihan & kekeringan botol
- Lama rendaman arak
- Label "pemakaian luar" di kedua produk`},

    {judul:"SOP-04 • Param & Salep (Kemin Brajamusti, Dry Foot Tapak Wojo)", isi:`A. PARAM / LULUR (Kemin Brajamusti)
1. Rendam beras 2-4 jam, tiriskan, tumbuk/giling halus bersama rempah segar.
2. Tambahkan bahan kering dan minyak sedikit demi sedikit hingga adonan kalis dan mudah dibalurkan.
3. Isi ke pot sesuai gramasi, padatkan, tutup rapat.
4. Produk basah berumur pendek — beri tanggal kedaluwarsa lebih pendek dan saran penyimpanan.

B. SALEP (Dry Foot Tapak Wojo)
1. Lelehkan basis (vaselin) dengan tim/double-boiler (±50-60 °C), jangan langsung di atas api.
2. Masukkan serbuk aktif sedikit demi sedikit sambil diaduk sampai rata.
3. Tambahkan minyak atsiri setelah agak dingin, aduk rata.
4. Tuang ke pot selagi cair, biarkan mengeras, baru ditutup.

TITIK KRITIS (QC)
- Kehalusan gilingan
- Homogenitas salep (tanpa butiran)
- Kebersihan pot
- Gramasi isi per pot`},

    {judul:"SOP-05 • Perhitungan HPP (Harga Pokok Produksi)", isi:`RUMUS BAKU (otomatis dihitung aplikasi)
1. Harga per g/ml = harga beli ÷ isi kemasan beli.
2. Biaya bahan = jumlah gramasi × harga per g/ml, ditambah % susut.
3. Biaya kemasan = (botol + label + segel + dus) × jumlah unit.
4. Tenaga kerja = upah pengerjaan per batch (walau dikerjakan sendiri, tetap dihitung).
5. Overhead = gas + listrik + air + penyusutan alat, dibagi rata per batch.
6. HPP batch = bahan + kemasan + tenaga kerja + overhead + lain-lain.
7. HPP per unit = HPP batch ÷ jumlah unit jadi.

ATURAN WAJIB
- Perbarui harga bahan di aplikasi setiap kali belanja — harga rempah fluktuatif.
- Susut/waste: minimal 5% untuk serbuk, param & salep; 8% untuk cairan/minyak.
- Review HPP minimal 1x per bulan atau saat harga bahan naik > 10%.
- Upah sendiri tetap masuk HPP — laba usaha bukan upah kerja.`},

    {judul:"SOP-06 • Penetapan Harga Jual", isi:`1. Hitung HPP per unit (otomatis di aplikasi).
2. Markup: reseller minimal 40-50% di atas HPP, retail minimal 80-100% di atas HPP.
3. Bulatkan harga ke atas ke kelipatan Rp 500 (otomatis di aplikasi).
4. Pastikan urutan sehat: HPP < harga reseller < harga retail, dengan selisih yang membuat reseller tetap untung.
5. Bandingkan dengan harga pasar produk sejenis; jangan banting harga di bawah HPP.
6. Harga promo tidak boleh lebih rendah dari HPP + 20%.
7. Tinjau harga tiap kali HPP berubah > 10%.`},

    {judul:"SOP-07 • Pengemasan, Label & Penyimpanan", isi:`1. Wadah harus baru, bersih, dan kering. Botol cairan dibilas sedikit alkohol lalu dikeringkan.
2. Label wajib memuat: nama produk, komposisi umum, isi bersih, nomor batch, tanggal produksi & kedaluwarsa, cara pakai, dan peringatan ("hanya untuk hewan/pemakaian luar" bila relevan).
3. Nomor batch: format KNJ-[kode produk]-[TTBBHH], contoh: KNJ-RC-260715.
4. Simpan produk jadi terpisah dari bahan baku; rotasi stok FIFO.
5. Catat setiap batch di buku produksi: tanggal, jumlah, penanggung jawab, hasil QC.`},

    {judul:"SOP-08 • Pemakaian Aplikasi & Cadangan Data", isi:`1. Semua perubahan resep/harga/SOP tersimpan otomatis di perangkat (browser) ini.
2. Data tidak ikut berpindah antarperangkat — lakukan Ekspor Data lalu kirim berkas .json ke perangkat lain dan gunakan Impor Data.
3. Ekspor data minimal 1x per minggu dan setiap selesai mengubah resep/SOP.
4. Tombol "Reset ke Contoh" menghapus seluruh perubahan — selalu ekspor dulu.
5. Satu orang ditunjuk sebagai admin resep (pemegang data utama) agar tidak ada dua versi data yang berbeda.`}
  ];
}

function renderSOP(){
  if(!Array.isArray(state.sop) || !state.sop.length) state.sop = sopBawaan();
  const bagian = state.sop.map((s,i)=>{
    const buka = (sopSedangEdit===i) || (sopSedangEdit===null && i===0);
    const isi = (sopSedangEdit===i) ? `
      <label>Judul bagian</label>
      <input value="${esk(s.judul)}" oninput="ubahSop(${i},'judul',this.value)">
      <label style="margin-top:10px">Isi SOP (teks biasa — penomoran 1. 2. 3. dan tanda - tinggal diketik)</label>
      <textarea rows="16" oninput="ubahSop(${i},'isi',this.value)">${esk(s.isi)}</textarea>
      <div style="margin-top:6px">
        <button class="btn btn-kecil" onclick="selesaiEditSop()">✓ Selesai Edit</button>
        <button class="btn btn-kecil btn-sekunder" style="color:var(--merah);border-color:var(--merah)" onclick="hapusSop(${i})">🗑 Hapus Bagian</button>
      </div>` : `
      <div class="teks-sop">${esk(s.isi)}</div>
      <button class="btn btn-kecil btn-sekunder catatan-noprint" style="margin-top:10px" onclick="mulaiEditSop(${i})">✏️ Edit Bagian Ini</button>`;
    return `<details class="sop" ${buka?"open":""}><summary>${esk(s.judul)}</summary><div class="isi-sop">${isi}</div></details>`;
  }).join("");
  return `
  <h2>📋 SOP — Standar Operasional Prosedur</h2>
  <div class="catatan catatan-noprint">✏️ SOP di bawah <b>bisa diedit</b>: buka bagiannya, klik <b>Edit Bagian Ini</b>, lalu ganti
  dengan SOP asli usaha Anda. Perubahan tersimpan <b>hanya di perangkat ini</b> (ikut terbawa saat Ekspor Data)
  dan <b>tidak</b> dipublikasikan ke internet/GitHub — SOP rahasia tetap aman.</div>
  ${bagian}
  <button class="btn btn-emas" onclick="tambahSop()">+ Tambah Bagian SOP</button>
  <button class="btn btn-sekunder" onclick="pulihkanSop()">↺ Kembalikan SOP Bawaan</button>`;
}

function mulaiEditSop(i){ sopSedangEdit = i; render(); }
function selesaiEditSop(){ sopSedangEdit = null; render(); }
function ubahSop(i, field, nilai){
  const s = state.sop[i]; if(!s) return;
  s[field] = nilai; simpan();   // tanpa render() agar fokus ketik tidak hilang
}
function tambahSop(){
  state.sop.push({judul:"Bagian SOP Baru", isi:""});
  sopSedangEdit = state.sop.length - 1;
  simpan(); render();
}
function hapusSop(i){
  const s = state.sop[i]; if(!s) return;
  if(!confirm('Hapus bagian "' + s.judul + '"?')) return;
  state.sop.splice(i,1); sopSedangEdit = null; simpan(); render();
}
function pulihkanSop(){
  if(confirm("Kembalikan seluruh SOP ke teks bawaan? SOP yang Anda tulis sendiri akan hilang.\n\nSaran: lakukan Ekspor Data dulu.")){
    state.sop = sopBawaan(); sopSedangEdit = null; simpan(); render();
  }
}

/* ================= MULAI ================= */
state = muatData();
render();
</script>
</body>
</html>
